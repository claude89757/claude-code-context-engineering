services:
  observatory:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - observatory-data:/app/backend/data
    environment:
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.lkeap.cloud.tencent.com/coding/anthropic}
      - LLM_MODEL=${LLM_MODEL:-kimi-k2.5}
      - PATROL_INTERVAL_MINUTES=${PATROL_INTERVAL_MINUTES:-30}
    restart: unless-stopped

volumes:
  observatory-data:
